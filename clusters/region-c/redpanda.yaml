apiVersion: v1
kind: Namespace
metadata:
  name: redpanda
---
apiVersion: cluster.redpanda.com/v1alpha2
kind: Redpanda
metadata:
  name: redpanda
  namespace: redpanda
spec:
  clusterSpec:
    image:
      repository: docker.redpanda.com/redpandadata/redpanda
      tag: v26.1.7
    statefulset:
      replicas: 3
      nodeSelector:
        role: redpanda
    resources:
      cpu:
        cores: 1
      memory:
        container:
          max: 2Gi
          min: 2Gi
    storage:
      persistentVolume:
        enabled: true
        size: 20Gi
        storageClass: premium-rwo
    listeners:
      kafka:
        port: 9092
        authenticationMethod: none
      http:
        port: 8082
        enabled: true
        authenticationMethod: none
      admin:
        port: 9644
      rpc:
        port: 33145
    logging:
      logLevel: info
      usageStats:
        enabled: false
    monitoring:
      enabled: true
      scrapeInterval: 15s
      labels:
        release: kube-prometheus-stack
    console:
      enabled: false
